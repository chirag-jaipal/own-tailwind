<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card UI</title>
  </head>
  <body
    class="chai-font-sans chai-bg-lightgray chai-flex chai-jc-center chai-ai-center chai-h-screen"
  >
    <div
      class="chai-shadow chai-bg-white chai-p-4 chai-rounded-8 chai-w-200 chai-border-solid chai-border-width-2 chai-border-gray"
    >
      <div class="chai-text-center chai-mb-4">
        <img
          src="./assets/profile_pic.jpg"
          alt="Profile-Pic"
          width="100%"
          class="chai-rounded-8 chai-mb-4"
        />
        <h2 class="chai-text-black chai-fw-bold">Chirag Jaipal</h2>
        <p class="chai-text-gray">Aspiring Developer</p>
      </div>
      <div class="chai-flex chai-jc-between chai-gap-5 chai-mt-4">
        <button
          class="chai-bg-blue chai-text-white chai-rounded-4 chai-border-none chai-p-2 chai-cursor-pointer"
        >
          Follow
        </button>
        <button
          class="chai-bg-green chai-text-white chai-rounded-4 chai-border-none chai-p-2 chai-cursor-pointer"
        >
          Message
        </button>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
